# AI inference proxy — routes OpenAI-compatible requests to TEI (embeddings) or vLLM (chat).
# Used by compose.ai.yaml; nginx listens on port 12434 (same port Docker Model Runner uses on Linux).
# The main stack reaches this proxy via MODEL_RUNNER_URL=http://host.docker.internal:12434.
events {}
http {
  server {
    listen 12434;

    # Embedding requests → TEI
    location /v1/embeddings {
      proxy_pass         http://tei:8080;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    # All other OpenAI-compatible requests (chat, models list, ...) → vLLM
    location / {
      proxy_pass         http://vllm:8000;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }
  }
}
